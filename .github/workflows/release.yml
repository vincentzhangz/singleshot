name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../singleshot-${{ matrix.target }}.tar.gz singleshot
          cd -

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../singleshot-${{ matrix.target }}.zip singleshot.exe
          cd -

      - uses: actions/upload-artifact@v4
        with:
          name: singleshot-${{ matrix.target }}
          path: singleshot-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify

  homebrew:
    name: Publish to Homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download release artifacts
        run: |
          # Download all platform release assets
          curl -L -o singleshot-x86_64-apple-darwin.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/singleshot-x86_64-apple-darwin.tar.gz"
          curl -L -o singleshot-aarch64-apple-darwin.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/singleshot-aarch64-apple-darwin.tar.gz"
          curl -L -o singleshot-x86_64-unknown-linux-gnu.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/singleshot-x86_64-unknown-linux-gnu.tar.gz"

      - name: Calculate SHA256
        id: sha
        run: |
          SHA_MACOS_X86=$(sha256sum singleshot-x86_64-apple-darwin.tar.gz | cut -d ' ' -f 1)
          SHA_MACOS_ARM=$(sha256sum singleshot-aarch64-apple-darwin.tar.gz | cut -d ' ' -f 1)
          SHA_LINUX=$(sha256sum singleshot-x86_64-unknown-linux-gnu.tar.gz | cut -d ' ' -f 1)
          echo "sha_macos_x86=${SHA_MACOS_X86}" >> $GITHUB_OUTPUT
          echo "sha_macos_arm=${SHA_MACOS_ARM}" >> $GITHUB_OUTPUT
          echo "sha_linux=${SHA_LINUX}" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: vincentzhangz/homebrew-singleshot
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          cat > homebrew-tap/Formula/singleshot.rb << 'EOF'
          # typed: false
          # frozen_string_literal: true

          class Singleshot < Formula
            desc "A CLI tool for testing AI models with a single prompt"
            homepage "https://github.com/vincentzhangz/singleshot"
            version "${{ steps.release.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/vincentzhangz/singleshot/releases/download/${{ github.ref_name }}/singleshot-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_macos_arm }}"
              end
              on_intel do
                url "https://github.com/vincentzhangz/singleshot/releases/download/${{ github.ref_name }}/singleshot-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_macos_x86 }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/vincentzhangz/singleshot/releases/download/${{ github.ref_name }}/singleshot-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_linux }}"
              end
            end

            def install
              bin.install "singleshot"
            end

            test do
              assert_match "singleshot", shell_output("#{bin}/singleshot --version")
            end
          end
          EOF

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/singleshot.rb
          git commit -m "singleshot ${{ steps.release.outputs.version }}"
          git push
